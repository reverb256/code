name: Build

on:
  pull_request:

concurrency:
  group: build-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build electron-trpc
        run: pnpm --filter @posthog/electron-trpc build

      - name: Build platform
        run: pnpm --filter @posthog/platform build

      - name: Build shared
        run: pnpm --filter @posthog/shared build

      - name: Build git
        run: pnpm --filter @posthog/git build

      - name: Build agent
        run: pnpm --filter agent build

      - name: Build code
        run: pnpm --filter code build